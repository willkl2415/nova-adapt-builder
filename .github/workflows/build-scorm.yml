# ============================================================================
# NOVA™ SCORM Build Pipeline
# Triggers when Adapt JSON is pushed to src/course/en/
# Clones Adapt Framework, installs plugins, builds SCORM 1.2 package
# ============================================================================
# FILE: .github/workflows/build-scorm.yml
# REPO: willkl2415/nova-adapt-builder
# ============================================================================

name: Build SCORM Package

on:
  push:
    paths:
      - 'src/course/en/**'
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout this repo (nova-adapt-builder) ──
      - name: Checkout nova-adapt-builder
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Setup Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 3. Clone Adapt Framework ──
      - name: Clone Adapt Framework
        run: |
          git clone --depth 1 --branch v5.24.3 https://github.com/adaptlearning/adapt_framework.git adapt-framework
          echo "✅ Adapt Framework cloned"

      # ── 4. Install Adapt Framework dependencies ──
      - name: Install Adapt dependencies
        working-directory: adapt-framework
        run: |
          npm install
          npx adapt-cli install
          echo "✅ Adapt dependencies installed"

      # ── 5. Install required plugins ──
      - name: Install Adapt plugins
        working-directory: adapt-framework
        run: |
          npx adapt-cli install adapt-contrib-text
          npx adapt-cli install adapt-contrib-mcq
          npx adapt-cli install adapt-contrib-gmcq
          npx adapt-cli install adapt-contrib-matching
          npx adapt-cli install adapt-contrib-narrative
          npx adapt-cli install adapt-contrib-accordion
          npx adapt-cli install adapt-contrib-hotgraphic
          npx adapt-cli install adapt-contrib-media
          npx adapt-cli install adapt-contrib-blank
          npx adapt-cli install adapt-contrib-assessment
          npx adapt-cli install adapt-contrib-assessmentResults
          npx adapt-cli install adapt-contrib-pageLevelProgress
          npx adapt-cli install adapt-contrib-trickle
          npx adapt-cli install adapt-contrib-bookmarking
          npx adapt-cli install adapt-contrib-resources
          npx adapt-cli install adapt-contrib-boxMenu
          npx adapt-cli install adapt-contrib-spoor
          echo "✅ All plugins installed"

      # ── 6. Copy NOVA course JSON into framework ──
      - name: Copy course JSON files
        run: |
          # Create the course directory
          mkdir -p adapt-framework/src/course/en

          # Copy all JSON files from nova-adapt-builder src into framework
          cp -v src/course/en/*.json adapt-framework/src/course/en/

          # List what was copied
          echo "── Course files copied ──"
          ls -la adapt-framework/src/course/en/
          echo ""

          # Show course title for logs
          if [ -f adapt-framework/src/course/en/course.json ]; then
            echo "Course title:"
            grep -o '"title": *"[^"]*"' adapt-framework/src/course/en/course.json | head -1
          fi

      # ── 7. Configure SCORM 1.2 (Spoor plugin) ──
      - name: Configure SCORM tracking
        run: |
          # Ensure config.json has Spoor (SCORM) enabled
          CONFIG_FILE="adapt-framework/src/course/en/config.json"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "No config.json found — creating default with SCORM 1.2 enabled"
            cat > "$CONFIG_FILE" << 'CONFIGEOF'
          {
            "_defaultLanguage": "en",
            "_defaultDirection": "ltr",
            "_accessibility": {
              "_isEnabled": true,
              "_isEnabledOnTouchDevices": false,
              "_shouldSupportLegacyBrowsers": false,
              "_isTextProcessorEnabled": true,
              "_isSkipNavigationEnabled": true,
              "_ariaLevels": {
                "_menu": 1,
                "_menuGroup": 2,
                "_menuItem": 2,
                "_page": 1,
                "_article": 2,
                "_block": 3,
                "_component": 4,
                "_componentItem": 5,
                "_notify": 1
              }
            },
            "_screenSize": {
              "_small": 520,
              "_medium": 760,
              "_large": 1024
            },
            "_spoor": {
              "_isEnabled": true,
              "_tracking": {
                "_shouldStoreResponses": true,
                "_shouldStoreAttempts": false,
                "_shouldRecordInteractions": true
              },
              "_reporting": {
                "_onTrackingCriteria": {
                  "_requireAssessmentPassed": false,
                  "_requireContentCompleted": true
                },
                "_onAssessmentFailure": "incomplete",
                "_resetStatusOnLanguageChange": false
              },
              "_advancedSettings": {
                "_scormVersion": "1.2",
                "_showDebugWindow": false,
                "_commitOnStatusChange": true,
                "_timedCommitFrequency": 10,
                "_maxCommitRetries": 5,
                "_commitRetryDelay": 2000,
                "_suppressErrors": true
              }
            },
            "_pageLevelProgress": {
              "_isEnabled": true,
              "_showPageCompletion": true,
              "_isCompletionIndicatorEnabled": false,
              "_isShownInNavigationBar": true
            },
            "_bookmarking": {
              "_isEnabled": true,
              "_level": "component"
            }
          }
          CONFIGEOF
            echo "✅ config.json created with SCORM 1.2"
          else
            echo "✅ config.json already exists"
          fi

      # ── 8. Build SCORM package ──
      - name: Build SCORM package
        working-directory: adapt-framework
        run: |
          npx grunt build
          echo "✅ Adapt build complete"
          ls -la build/

      # ── 9. Create SCORM zip ──
      - name: Package SCORM zip
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          # Extract course title for filename
          COURSE_TITLE="nova-course"
          if [ -f adapt-framework/src/course/en/course.json ]; then
            TITLE=$(grep -o '"displayTitle": *"[^"]*"' adapt-framework/src/course/en/course.json | head -1 | sed 's/"displayTitle": *"//;s/"//')
            if [ -n "$TITLE" ]; then
              COURSE_TITLE=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
            fi
          fi

          FILENAME="SCORM-${COURSE_TITLE}-${TIMESTAMP}.zip"

          cd adapt-framework/build
          zip -r "../../${FILENAME}" . -x "*.DS_Store"
          cd ../..

          echo "SCORM_FILENAME=${FILENAME}" >> $GITHUB_ENV
          echo "SCORM_TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

          echo "✅ SCORM package created: ${FILENAME}"
          ls -lh "${FILENAME}"

      # ── 10. Upload as build artifact ──
      - name: Upload SCORM artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorm-package
          path: ${{ env.SCORM_FILENAME }}
          retention-days: 90

      # ── 11. Create GitHub Release ──
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: scorm-${{ env.SCORM_TIMESTAMP }}
          name: "SCORM Package — ${{ env.SCORM_TIMESTAMP }}"
          body: |
            ## NOVA™ SCORM 1.2 Package

            Automatically built by the NOVA SCORM Pipeline.

            **Standard:** SCORM 1.2 (MOD DLE compatible)
            **Framework:** Adapt Framework v5.24.3
            **Built:** ${{ env.SCORM_TIMESTAMP }}

            ### How to deploy
            1. Download the .zip file below
            2. Upload to your LMS (MOD DLE, Moodle, etc.)
            3. Select "SCORM 1.2" as the package type
            4. Learners can launch immediately

            ---
            *Generated by NOVA™ Agentic Allied Defence Training Platform*
          files: ${{ env.SCORM_FILENAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Summary ──
      - name: Build Summary
        run: |
          echo "## NOVA SCORM Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** \`${{ env.SCORM_FILENAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SCORM Version:** 1.2" >> $GITHUB_STEP_SUMMARY
          echo "- **Framework:** Adapt v5.24.3" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Ready for LMS deployment" >> $GITHUB_STEP_SUMMARY
