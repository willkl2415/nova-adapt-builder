# ============================================================================
# NOVA™ Course Package Builder
# Triggers when course config files are pushed to courses/
# Validates course JSON structure and packages as a distributable zip
# ============================================================================
# FILE: .github/workflows/build-course.yml
# REPO: willkl2415/nova-adapt-builder
# ============================================================================

name: Build Course Package

on:
  push:
    paths:
      - 'courses/**'
      - 'config/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      # ── 1. Checkout nova-adapt-builder ──────────────────────────────────────
      - name: Checkout nova-adapt-builder
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 3. Validate course JSON files ────────────────────────────────────────
      - name: Validate course JSON
        run: |
          echo "── Validating course JSON files ──"
          ERRORS=0
          for f in courses/**/*.json config/**/*.json src/course/en/*.json; do
            [ -f "$f" ] || continue
            if python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "✅ Valid: $f"
            else
              echo "❌ Invalid JSON: $f"
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS JSON file(s) failed validation"
            exit 1
          fi
          echo "✅ All JSON files valid"

      # ── 4. List course contents ──────────────────────────────────────────────
      - name: Inspect course structure
        run: |
          echo "── Repository structure ──"
          find . -not -path './.git/*' -type f | sort
          echo ""
          echo "── Course files in src/course/en/ ──"
          if [ -d src/course/en ]; then
            ls -lh src/course/en/
            echo ""
            if [ -f src/course/en/course.json ]; then
              echo "── Course metadata ──"
              python3 -c "
          import json
          d = json.load(open('src/course/en/course.json'))
          print('Title:       ', d.get('title','—'))
          print('DisplayTitle:', d.get('displayTitle','—'))
          print('Description: ', d.get('description','—')[:80])
          " 2>/dev/null || true
            fi
          else
            echo "No src/course/en/ directory yet"
          fi

      # ── 5. Package course files as zip ───────────────────────────────────────
      - name: Package course zip
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          COURSE_TITLE="nova-course"

          if [ -f src/course/en/course.json ]; then
            TITLE=$(python3 -c "
          import json
          try:
            d = json.load(open('src/course/en/course.json'))
            t = d.get('displayTitle') or d.get('title','')
            print(t[:60])
          except: pass
          " 2>/dev/null || true)
            if [ -n "$TITLE" ]; then
              COURSE_TITLE=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | \
                sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
            fi
          fi

          FILENAME="course-package-${COURSE_TITLE}-${TIMESTAMP}.zip"

          # Package all course source files
          zip -r "${FILENAME}" src/ courses/ config/ \
            -x "*.DS_Store" -x "__MACOSX/*" -x ".git/*" 2>/dev/null || \
          zip -r "${FILENAME}" src/ -x "*.DS_Store" -x "__MACOSX/*"

          echo "COURSE_FILENAME=${FILENAME}" >> $GITHUB_ENV
          echo "COURSE_TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          echo "✅ Course package created: ${FILENAME} ($(du -sh ${FILENAME} | cut -f1))"

      # ── 6. Upload as workflow artifact ───────────────────────────────────────
      - name: Upload course artifact
        uses: actions/upload-artifact@v4
        with:
          name: course-package-${{ env.COURSE_TIMESTAMP }}
          path: ${{ env.COURSE_FILENAME }}
          retention-days: 90

      # ── 7. Create GitHub Release ─────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: course-${{ env.COURSE_TIMESTAMP }}
          name: "Course Package — ${{ env.COURSE_TIMESTAMP }}"
          body: |
            ## NOVA™ Course Source Package

            Course JSON source files packaged for distribution or manual build.

            | Field | Value |
            |-------|-------|
            | Type | Adapt JSON source |
            | Built | ${{ env.COURSE_TIMESTAMP }} |

            ### Contents
            - `src/course/en/` — Adapt-compatible course JSON
            - `courses/` — Course configuration files
            - `config/` — Build configuration

            ### To build SCORM from this package
            Push the `src/course/en/` files to trigger the **Build SCORM Package** workflow.

            ---
            *Generated by NOVA™ Agentic Allied Defence Training Platform*
          files: ${{ env.COURSE_FILENAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Summary ───────────────────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## ✅ NOVA Course Package Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | \`${{ env.COURSE_FILENAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Adapt JSON source |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Ready for distribution |" >> $GITHUB_STEP_SUMMARY
